<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stand — Join the Waitlist</title>
<meta name="description" content="Stand is where kids ages 8-14 build and run real businesses. Join the waitlist.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=Yellowtail&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F9F3D9;
    --red: #DB1F26;
    --black: #1a1a1a;
    --mustard: #FFC712;
    --postit: #F7F080;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--black);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Nav ===== */
  nav {
    padding: 28px 40px;
    display: flex;
    align-items: center;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    line-height: 0;
  }
  .logo img {
    display: block;
    height: 44px;
    width: auto;
  }

  /* ===== Hero ===== */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 40px 80px;
  }

  /* Slogan stack — fades in on cream, then a skewed cream cover sweeps off
     to the right to reveal the script "For real." Same animation as the
     pilot landing's hero. */
  h1.hero-slogan {
    margin: 0 0 56px;
    line-height: 0;
  }
  .slogan-stack {
    position: relative;
    overflow: hidden;
    width: min(560px, 88vw);
    aspect-ratio: 120.82 / 105.14;
    margin: 0 auto;
    opacity: 0;
    animation: slogan-fade-in 0.6s ease-out 0.33s forwards;
  }
  .slogan-stack img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .slogan-stack .slogan-cover {
    position: absolute;
    top: -5%;
    bottom: -5%;
    left: -20%;
    right: -20%;
    background: var(--cream);
    transform-origin: top center;
    transform: translateX(0) skewX(-8deg);
    animation: slogan-sweep 0.935s ease-out 1.205s forwards;
  }
  .slogan-stack .slogan-build { pointer-events: none; }
  @keyframes slogan-fade-in { to { opacity: 1; } }
  @keyframes slogan-sweep { to { transform: translateX(130%) skewX(-8deg); } }
  @media (prefers-reduced-motion: reduce) {
    .slogan-stack {
      opacity: 1;
      animation: none;
    }
    .slogan-stack .slogan-cover {
      transform: translateX(130%) skewX(-8deg);
      animation: none;
    }
  }

  /* ===== Hero form ===== */
  .hero-form {
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    border: 3px solid var(--black);
    box-shadow: 5px 5px 0 var(--black);
    background: var(--white);
  }
  .hero-form input {
    flex: 1;
    padding: 14px 18px;
    border: none; outline: none;
    font-family: inherit; font-size: 15px; font-weight: 500;
    background: var(--white); color: var(--black);
    min-width: 0;
  }
  .hero-form input:focus { background: var(--postit); }
  .hero-form button {
    background: var(--red); color: var(--cream);
    padding: 14px 24px;
    font-family: inherit; font-weight: 700;
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    border: none; border-left: 3px solid var(--black);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .hero-form button:hover { background: var(--black); }
  .hero-form button:disabled { opacity: 0.7; cursor: not-allowed; }
  .hero-meta {
    margin-top: 22px;
    font-family: 'Yellowtail', cursive;
    font-size: 26px;
    color: var(--red);
    transform: rotate(-2deg);
    display: inline-block;
  }

  /* ===== Footer ===== */
  footer {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  footer span, footer a {
    font-size: 12px;
    font-weight: 600;
    color: rgba(26,26,26,0.45);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  footer a:hover { color: var(--black); }

  /* ===== Mobile ===== */
  @media (max-width: 600px) {
    nav { padding: 20px 24px; }
    .logo img { height: 36px; }
    .hero { padding: 20px 24px 60px; }
    h1.hero-slogan { margin-bottom: 40px; }
    .hero-form { flex-direction: column; }
    .hero-form button { border-left: 0; border-top: 3px solid var(--black); }
    footer { padding: 20px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo" aria-label="Stand"><img src="/brand/Stand_Logo_Founder Red.svg" alt="Stand"></a>
</nav>

<section class="hero">
  <h1 class="hero-slogan" aria-label="Build your own thing. For real.">
    <div class="slogan-stack" role="img">
      <img class="slogan-forreal" src="/landing-explorations-2026-04-21/slogans/STAND_ForReal_only.svg" alt="" aria-hidden="true" draggable="false">
      <div class="slogan-cover" aria-hidden="true"></div>
      <img class="slogan-build" src="/landing-explorations-2026-04-21/slogans/STAND_BuildYourOwn_only.svg" alt="" aria-hidden="true" draggable="false">
    </div>
  </h1>

  <form class="hero-form" id="waitlist-top" data-source="index-hero" onsubmit="event.preventDefault(); window.submitPilotWaitlist(this);">
    <input type="email" placeholder="Parent email" required>
    <button type="submit">Join waitlist</button>
  </form>

  <div class="hero-meta">built by kids. for real.</div>
</section>

<footer>
  <span>&copy; 2026 STAND, INC.</span>
  <a href="/privacy">Privacy</a>
  <a href="/terms">Terms</a>
</footer>

<script>
  /**
   * Waitlist submit — POSTs to the stand-app waitlist endpoint on
   * app.standkids.com. Cross-origin; the endpoint sets CORS headers
   * for standkids.com. Source is read from the form's data-source
   * attribute (index-hero, pilot-hero, pilot-closing).
   */
  window.submitPilotWaitlist = async function(form) {
    const input = form.querySelector('input[type="email"]');
    const btn = form.querySelector('button');
    const email = (input && input.value || '').trim();
    const source = form.getAttribute('data-source') || 'index';
    if (!email || !email.includes('@')) {
      input && input.focus();
      return;
    }
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res = await fetch('https://app.standkids.com/api/waitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, source: source }),
      });
      if (!res.ok) throw new Error('bad status ' + res.status);
      btn.textContent = 'You are in';
      input && (input.value = '');
    } catch (err) {
      console.warn('waitlist submit failed:', err);
      btn.disabled = false;
      btn.textContent = 'Try again';
      setTimeout(function() { btn.textContent = originalText; }, 2500);
    }
  };
</script>
</body>
</html>
