<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stand — Join the Waitlist</title>
<meta name="description" content="Stand is where kids ages 8-14 build and run real businesses. Join the waitlist.">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9F3C8;
    --dark: #1A1A1A;
    --red: #D94532;
    --green: #387B43;
    --yellow: #F5D959;
    --blue: #0073E4;
    --text: #1A1A1A;
    --text-muted: rgba(26,26,26,0.45);
    --text-faint: rgba(26,26,26,0.3);
    --white: #FFFDF7;
    --border-width: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { font-family: 'Fraunces', serif; }

  /* Outer frame with mitered colored borders */
  .frame {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    border-top: var(--border-width) solid var(--green);
    border-right: var(--border-width) solid var(--yellow);
    border-bottom: var(--border-width) solid var(--red);
    border-left: var(--border-width) solid var(--blue);
    background: var(--bg);
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    padding: 28px 40px;
  }

  .logo svg {
    height: 44px;
    width: auto;
    display: block;
  }

  /* Hero */
  .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 40px 60px;
    max-width: 720px;
  }

  h1 {
    font-weight: 900;
    font-size: clamp(3rem, 7vw, 5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--dark);
    margin-bottom: 48px;
  }

  h1 em {
    display: block;
    color: var(--red);
    font-style: italic;
    font-family: 'Fraunces', serif;
    margin-top: 16px;
  }

  /* Form */
  .form-wrapper {
    max-width: 480px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-row input {
    flex: 1;
    padding: 15px 20px;
    border: 2px solid rgba(26,26,26,0.1);
    border-radius: 999px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--dark);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-row input::placeholder { color: var(--text-faint); }
  .input-row input:focus {
    border-color: var(--dark);
    box-shadow: 0 0 0 3px rgba(26,26,26,0.06);
  }

  .btn-submit {
    background: var(--yellow);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    border: none;
    border-radius: 999px;
    padding: 15px 32px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .btn-submit:hover {
    background: #e6c94f;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(245,217,89,0.3);
  }
  .btn-submit:active { transform: translateY(0); }

  /* Confirm state */
  .confirm { display: none; }
  .confirm h2 {
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--dark);
    margin-bottom: 8px;
  }
  .confirm p {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 24px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .footer span, .footer a {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-faint);
    text-decoration: none;
  }
  .footer a:hover { color: var(--text-muted); }

  /* Mobile */
  @media (max-width: 600px) {
    .nav { padding: 20px 24px; }
    .hero { padding: 48px 24px 40px; }
    .input-row { flex-direction: column; }
    .btn-submit { width: 100%; }
    .logo svg { height: 36px; }
    .footer { left: 24px; }
  }
</style>
</head>
<body>

<div class="frame">
  <nav class="nav">
    <div class="logo">

      </svg>
    </div>
  </nav>

  <section class="hero">
    <h1>Build your own<br>thing.<br><em>For Real.</em></h1>

    <div class="form-wrapper" id="form-wrapper">
      <div class="input-row">
        <input type="email" id="email-input" placeholder="Parent email" />
        <button class="btn-submit" onclick="submitWaitlist()">Join Waitlist</button>
      </div>
    </div>

    <div class="confirm" id="confirm">
      <h2>You're on the list.</h2>
      <p>We'll reach out when it's time. Thanks for believing in what your kid can build.</p>
    </div>
  </section>

  <div class="footer">
    <span>&copy; 2026 Stand Kids, Inc.</span>
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
  </div>
</div>

<script>
  function submitWaitlist() {
    const email = document.getElementById('email-input').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email-input').style.borderColor = 'var(--red)';
      document.getElementById('email-input').focus();
      return;
    }
    document.getElementById('form-wrapper').style.display = 'none';
    document.getElementById('confirm').style.display = 'block';
  }
  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitWaitlist();
  });
</script>
</body>
</html>
